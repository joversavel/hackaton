<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helpdesk AI — Aanmelden</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <style>
    /* ── POLLET GROUP IT BRAND KIT ── */
    :root {
      --navy:     #14468C;
      --navydark: #0e3268;
      --bg:       #eef2f8;
      --card:     #ffffff;
      --border:   #dde3ed;
      --border-2: #c5d5e9;
      --text:     #0f1f35;
      --muted:    #5a6e87;
      --orange:   #d97706;
      --shadow:   0 8px 32px rgba(20,70,140,0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── LOGIN CARD ── */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 440px;
      max-width: 95vw;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      background: var(--navy);
      padding: 1.25rem 1.75rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .card-header svg { height: 34px; width: auto; flex-shrink: 0; }

    .card-header-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,.25);
      margin: 0 .3rem;
    }

    .card-header-title {
      color: rgba(255,255,255,.9);
      font-size: .9rem;
      font-weight: 600;
    }

    .card-body {
      padding: 1.75rem;
    }

    h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .user-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 400px;
      overflow-y: auto;
    }

    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    .user-btn {
      text-align: left;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      background: #f8fafd;
      font-family: inherit;
      width: 100%;
      transition: all 0.15s;
    }
    .user-btn:hover {
      background: #e4ecf7;
      border-color: var(--navy);
    }
    .user-btn strong {
      font-size: 0.9rem;
      color: var(--text);
      display: block;
      font-weight: 600;
    }
    .user-meta {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .role-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .role-dot.admin   { background: var(--navy); }
    .role-dot.beperkt { background: var(--orange); }
  </style>
</head>
<body>

      <span class="card-header-title">Helpdesk AI</span>
    </div>
    <div class="card-body">
      <h2>Aanmelden</h2>
      <p class="card-sub">Selecteer uw account om door te gaan.</p>
      <div class="user-list">
        {% for u in all_users %}
        <button class="user-btn" onclick="login('{{ u.email }}')">
          <strong>{{ u.display_name }}</strong>
          <div class="user-meta">
            <span class="role-dot {{ u.role }}"></span>
            {{ u.email }}
          </div>
        </button>
        {% endfor %}
      </div>
    </div>
  </div>

  <script>
    function login(email) {
      fetch('/do-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      }).then(r => r.json()).then(d => { if (d.ok) location.href = '/'; });
    }
  </script>
</body>
</html>
